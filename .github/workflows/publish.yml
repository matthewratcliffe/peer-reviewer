name: Build & Publish Extensions

on:
  workflow_dispatch:
    inputs:
      publish_vscode:
        description: 'Publish VS Code extension'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      publish_rider:
        description: 'Publish Rider plugin'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      publish_vs:
        description: 'Publish Visual Studio extension'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      publish_tui:
        description: 'Publish TUI to npm and GitHub Releases'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  DOTNET_VERSION: '8.0.x'
  VERSION: '0.0.${{ github.run_number }}'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Build the service binary (shared by all extensions)
  # ─────────────────────────────────────────────────────────────────────
  build-service:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: peer-reviewer-service
            platform: linux
            pkg-target: node18-linux-x64
          - os: macos-latest
            binary: peer-reviewer-service
            platform: macos
            pkg-target: node18-macos-x64
          - os: windows-latest
            binary: peer-reviewer-service.exe
            platform: windows
            pkg-target: node18-win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build CJS
        working-directory: packages/service
        run: npm run build:cjs

      - name: Package binary
        working-directory: packages/service
        run: npx pkg dist-cjs/index.js --target ${{ matrix.pkg-target }} --output ../../dist-bin/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: service-binary-${{ matrix.platform }}
          path: dist-bin/${{ matrix.binary }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Build the TUI binary (standalone interactive terminal client)
  # ─────────────────────────────────────────────────────────────────────
  build-tui:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: virtualpeerreview
            platform: linux
            pkg-target: node18-linux-x64
          - os: macos-latest
            binary: virtualpeerreview
            platform: macos
            pkg-target: node18-macos-x64
          - os: windows-latest
            binary: virtualpeerreview.exe
            platform: windows
            pkg-target: node18-win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build CJS
        working-directory: packages/tui
        run: npm run build:cjs

      - name: Package binary
        working-directory: packages/tui
        run: npx pkg dist-cjs/index.js --target ${{ matrix.pkg-target }} --output ../../dist-bin/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: tui-binary-${{ matrix.platform }}
          path: dist-bin/${{ matrix.binary }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Build VS Code Extension (always runs)
  # ─────────────────────────────────────────────────────────────────────
  build-vscode:
    needs: build-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set version
        working-directory: ides/vscode
        run: npm version "${{ env.VERSION }}" --no-git-tag-version

      - name: Download service binaries
        uses: actions/download-artifact@v4
        with:
          pattern: service-binary-*
          path: ides/vscode/bin
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x ides/vscode/bin/peer-reviewer-service || true

      - name: Install dependencies
        working-directory: ides/vscode
        run: npm ci

      - name: Compile TypeScript
        working-directory: ides/vscode
        run: npx tsc

      - name: Package VSIX
        working-directory: ides/vscode
        run: npx @vscode/vsce package --out "vscode_peerreviewer_v.${{ env.VERSION }}.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: ides/vscode/vscode_peerreviewer_v.${{ env.VERSION }}.vsix

  # ─────────────────────────────────────────────────────────────────────
  # Publish VS Code Extension (only when selected)
  # ─────────────────────────────────────────────────────────────────────
  publish-vscode:
    needs: build-vscode
    if: github.event.inputs.publish_vscode == 'yes'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vscode-vsix
          path: ides/vscode

      - name: Install dependencies
        working-directory: ides/vscode
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        working-directory: ides/vscode
        run: npx @vscode/vsce publish --packagePath "vscode_peerreviewer_v.${{ env.VERSION }}.vsix" --azure-credential

      - name: Publish to Open VSX Registry
        working-directory: ides/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish "vscode_peerreviewer_v.${{ env.VERSION }}.vsix" --pat "$OVSX_PAT"

  # ─────────────────────────────────────────────────────────────────────
  # Build JetBrains Rider Plugin (always runs)
  # ─────────────────────────────────────────────────────────────────────
  build-rider:
    needs: build-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set version
        working-directory: ides/rider
        run: sed -i "s/^version = .*/version = \"${{ env.VERSION }}\"/" build.gradle.kts

      - name: Download service binaries
        uses: actions/download-artifact@v4
        with:
          pattern: service-binary-*
          path: dist-bin
          merge-multiple: true

      - name: Make binary executable
        run: chmod +x dist-bin/peer-reviewer-service || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and sign plugin
        working-directory: ides/rider
        env:
          JETBRAINS_SIGNING_KEY: ${{ secrets.JETBRAINS_SIGNING_KEY }}
          JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
        run: gradle signPlugin

      - name: Find built plugin ZIP
        id: find-zip
        working-directory: ides/rider
        run: |
          ZIP=$(find build/distributions -name "*-signed.zip" -o -name "*.zip" | head -1)
          cp "$ZIP" "rider_peerreviewer_v.${{ env.VERSION }}.zip"
          echo "path=ides/rider/rider_peerreviewer_v.${{ env.VERSION }}.zip" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: rider-plugin
          path: ides/rider/rider_peerreviewer_v.${{ env.VERSION }}.zip

  # ─────────────────────────────────────────────────────────────────────
  # Publish JetBrains Rider Plugin (only when selected)
  # ─────────────────────────────────────────────────────────────────────
  publish-rider:
    needs: build-rider
    if: github.event.inputs.publish_rider == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set version
        working-directory: ides/rider
        run: sed -i "s/^version = .*/version = \"${{ env.VERSION }}\"/" build.gradle.kts

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to JetBrains Marketplace
        working-directory: ides/rider
        env:
          JETBRAINS_SIGNING_KEY: ${{ secrets.JETBRAINS_SIGNING_KEY }}
          JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
        run: gradle publishPlugin -PintellijPublishToken="${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}"

  # ─────────────────────────────────────────────────────────────────────
  # Build Visual Studio Extension (always runs)
  # ─────────────────────────────────────────────────────────────────────
  build-visual-studio:
    needs: build-service
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Set version
        shell: pwsh
        run: |
          $manifest = "ides/visual-studio/PeerReviewer/source.extension.vsixmanifest"
          $content = Get-Content $manifest -Raw
          $content = $content -replace '(<Identity[^>]*)\sVersion="[^"]*"', "`$1 Version=`"${{ env.VERSION }}`""
          Set-Content $manifest $content

      - name: Download Windows service binary
        uses: actions/download-artifact@v4
        with:
          name: service-binary-windows
          path: ides/visual-studio/PeerReviewer/bin

      - name: Restore packages
        working-directory: ides/visual-studio
        run: msbuild PeerReviewer.sln /t:Restore

      - name: Build VSIX
        working-directory: ides/visual-studio
        run: msbuild PeerReviewer.sln /p:Configuration=Release /p:DeployExtension=false

      - name: Find VSIX
        id: find-vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "ides/visual-studio" -Recurse -Filter "*.vsix" | Select-Object -First 1
          if (-not $vsix) {
            Write-Error "No .vsix file found after build"
            exit 1
          }
          $newName = "visualstudio_peerreviewer_v.${{ env.VERSION }}.vsix"
          $dest = Join-Path $vsix.DirectoryName $newName
          Copy-Item $vsix.FullName $dest
          echo "path=$dest" >> $env:GITHUB_OUTPUT
          echo "name=$newName" >> $env:GITHUB_OUTPUT

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: visual-studio-vsix
          path: ${{ steps.find-vsix.outputs.path }}

  # ─────────────────────────────────────────────────────────────────────
  # Publish Visual Studio Extension (only when selected)
  # ─────────────────────────────────────────────────────────────────────
  publish-visual-studio:
    needs: build-visual-studio
    if: github.event.inputs.publish_vs == 'yes'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: visual-studio-vsix
          path: unsigned-vsix

      - name: Upload for signing
        uses: actions/upload-artifact@v4
        with:
          name: visual-studio-vsix-unsigned
          path: unsigned-vsix/*.vsix

      - name: Sign VSIX with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: 'vsix'
          github-artifact-id: visual-studio-vsix-unsigned
          wait-for-completion: true
          output-artifact-directory: signed-vsix

      - name: Publish to Visual Studio Marketplace
        shell: pwsh
        env:
          VS_MARKETPLACE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vsix = Get-ChildItem -Path "signed-vsix" -Filter "*.vsix" | Select-Object -First 1
          $vsixPublisher = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.VisualStudio.Component.VSSDK `
            -find "VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe" | Select-Object -First 1
          if (-not $vsixPublisher) {
            Write-Error "VsixPublisher.exe not found"
            exit 1
          }
          & $vsixPublisher publish `
            -payload $vsix.FullName `
            -publishManifest "ides/visual-studio/publishManifest.json" `
            -personalAccessToken $env:VS_MARKETPLACE_PAT

  # ─────────────────────────────────────────────────────────────────────
  # Publish TUI to npm (only when selected)
  # ─────────────────────────────────────────────────────────────────────
  publish-tui:
    needs: build-tui
    if: github.event.inputs.publish_tui == 'yes'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Set version
        working-directory: packages/tui
        run: npm version "${{ env.VERSION }}" --no-git-tag-version

      - name: Build
        working-directory: packages/tui
        run: npm run build

      - name: Publish to npm
        working-directory: packages/tui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Download TUI binaries
        uses: actions/download-artifact@v4
        with:
          pattern: tui-binary-*
          path: tui-artifacts
          merge-multiple: true

      - name: Create tag
        run: |
          git tag "tui-v${{ env.VERSION }}"
          git push origin "tui-v${{ env.VERSION }}"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "tui-v${{ env.VERSION }}"
          name: "Virtual Peer Review TUI v${{ env.VERSION }}"
          body: |
            ## Virtual Peer Review TUI v${{ env.VERSION }}

            Interactive terminal client for Virtual Peer Review.

            **Install via npm:**
            ```
            npm install -g virtualpeerreview
            ```

            **Or download the standalone binary for your platform below.**
          files: |
            tui-artifacts/virtualpeerreview
            tui-artifacts/virtualpeerreview.exe

  # ─────────────────────────────────────────────────────────────────────
  # Create GitHub Release with IDE extension artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    if: always() && !cancelled() && !failure()
    needs: [build-vscode, build-rider, build-visual-studio]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            artifacts/vscode-vsix/vscode_peerreviewer_*.vsix
            artifacts/rider-plugin/rider_peerreviewer_*.zip
            artifacts/visual-studio-vsix/visualstudio_peerreviewer_*.vsix
